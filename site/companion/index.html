<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Suminar — companion</title>
<style>
  @font-face {
    font-family: 'Instrument Sans';
    font-style: normal; font-weight: 400 700; font-display: swap;
    src: url(/fonts/InstrumentSans-var.woff2) format('woff2');
  }
  :root {
    --accent: #2b46c8; --accent-deep: #1a2a6e; --accent-gold: #d9a527;
    --accent-tint: #e9eefb; --accent-contrast: #10142a; --paper: #f7f7f2;
    --mut: #5c6070; --line: #dfe0d9; --card: #ffffff; --err: #b4232c;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --accent: #5570e8; --accent-deep: #8095ee; --accent-gold: #e5b53a;
      --accent-tint: #141a38; --accent-contrast: #e6e7ef; --paper: #0e1226;
      --mut: #9aa0b5; --line: #232946; --card: #131834; --err: #f07880;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--accent-contrast);
    font-family: 'Instrument Sans', 'Segoe UI', system-ui, sans-serif; line-height: 1.5;
  }
  a { color: var(--accent); }
  a:focus-visible, button:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  /* The lectern card: one narrow column, designed for a window beside a chat. */
  .col { max-width: 34rem; margin: 0 auto; padding: 1rem 1rem 3rem; }
  header { display: flex; align-items: baseline; gap: .55rem; margin: .3rem 0 1rem; }
  .wordmark { font-weight: 700; font-size: 1.05rem; letter-spacing: .01em; }
  .wordmark .dot { color: var(--accent); }
  .sublabel { font-size: .6875rem; letter-spacing: .09em; text-transform: uppercase; color: var(--mut); font-weight: 600; }
  header a.acct { margin-left: auto; font-size: .78125rem; text-decoration: none; }
  h2 { font-size: .6875rem; letter-spacing: .09em; text-transform: uppercase; color: var(--mut); font-weight: 600; margin: 1.4rem 0 .5rem; }
  input {
    width: 100%; font: inherit; font-size: .9063rem; color: var(--accent-contrast);
    background: var(--card); border: 1px solid var(--line); border-radius: 6px; padding: .5rem .65rem;
  }
  input::placeholder { color: var(--mut); }
  button {
    font: inherit; font-size: .8125rem; background: var(--accent); color: var(--paper);
    border: 0; border-radius: 4px; padding: .35rem .8rem; cursor: pointer;
  }
  button:hover { background: var(--accent-deep); }
  button.ghost { background: transparent; color: var(--accent); border: 1px solid var(--line); }
  button.ghost:hover { border-color: var(--accent); background: transparent; }
  .status { font-size: .8125rem; color: var(--mut); min-height: 1.1rem; margin: .4rem 0 0; }
  .status.err { color: var(--err); }

  .tabs { display: flex; gap: .4rem; margin: .2rem 0 .8rem; border-bottom: 1px solid var(--line); }
  .tab {
    background: none; border: none; border-bottom: 2px solid transparent; border-radius: 0;
    color: var(--mut); font-size: .8438rem; font-weight: 600; padding: .35rem .6rem; cursor: pointer;
  }
  .tab:hover { color: var(--accent); background: none; }
  .tab.active { color: var(--accent-contrast); border-bottom-color: var(--accent); }
  .tablive { display: inline-block; width: .4rem; height: .4rem; border-radius: 50%; background: var(--accent); margin-left: .35rem; vertical-align: middle; }
  #filter { position: sticky; top: 0; z-index: 2; }
  .entry {
    display: flex; align-items: flex-start; gap: .55rem;
    padding: .5rem 0; border-bottom: 1px solid var(--line);
  }
  /* Author display rules beat the UA's [hidden] — restate it, or filtering
     computes correctly while hiding nothing. */
  .entry[hidden], .sem[hidden] { display: none; }
  .entry .dot { flex: 0 0 auto; width: .5rem; height: .5rem; border-radius: 50%; margin-top: .45rem; background: var(--mut); }
  .entry .dot.ready { background: var(--accent); }
  .entry .dot.warn { background: var(--accent-gold); }
  .entry .dot.bad { background: var(--err); }
  .entry .body { flex: 1 1 auto; min-width: 0; }
  .cite { font-size: .8438rem; line-height: 1.4; }
  .handlechip {
    display: inline-block; margin-top: .25rem;
    font-family: ui-monospace, 'Cascadia Mono', Consolas, monospace;
    font-size: .75rem; padding: .1rem .5rem; border: 1px solid var(--line); border-radius: 999px;
    background: transparent; color: var(--accent-contrast); cursor: copy;
  }
  .handlechip:hover { border-color: var(--accent); background: color-mix(in srgb, var(--accent-tint) 60%, transparent); }
  .handlechip.copied { border-color: var(--accent); background: var(--accent-tint); color: var(--accent); }

  /* The live strip: the current seminar's participants, pinned by liveness —
     no selection, no cross-tab state; it appears when a record is growing
     and fades when the seminar goes quiet. */
  .livestrip {
    border: 1px solid var(--accent); border-radius: 8px; padding: .5rem .6rem; margin: 0 0 .7rem;
    background: color-mix(in srgb, var(--accent-tint) 55%, transparent);
  }
  .livestriphead { display: flex; align-items: baseline; gap: .45rem; font-size: .78125rem; min-width: 0; }
  .livestriptitle { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .livestripchips { margin-top: .3rem; display: flex; flex-wrap: wrap; gap: .3rem .35rem; }
  .livestripchips .handlechip { margin-top: 0; }
  .openedpill {
    display: inline-block; font-size: .65625rem; font-weight: 700; letter-spacing: .06em;
    color: var(--mut); border: 1px solid var(--line); border-radius: 999px; padding: 0 .45rem;
  }
  .sem { padding: .55rem 0; border-bottom: 1px solid var(--line); cursor: pointer; }
  .sem:hover { background: color-mix(in srgb, var(--accent-tint) 40%, transparent); }
  /* The seminar page: header, chip strip, and the record. */
  .seminarhead { display: flex; align-items: center; gap: .45rem; margin: .2rem 0 .5rem; min-width: 0; }
  .backbtn { background: none; border: none; color: var(--accent); font-size: 1.05rem; cursor: pointer; padding: .1rem .35rem; }
  .backbtn:hover { background: none; color: var(--accent-deep); }
  .seminartitle { font-weight: 700; font-size: .9375rem; flex: 1 1 auto; min-width: 0; }
  .seminartitle.derived { font-weight: 400; font-style: italic; }
  .semchips { display: flex; flex-wrap: wrap; gap: .3rem .35rem; margin: 0 0 .8rem; }
  .semchips .handlechip { margin-top: 0; }
  .turn { padding: .55rem 0 .55rem .6rem; border-bottom: 1px solid var(--line); }
  .turn.source_agent { background: color-mix(in srgb, var(--accent-tint) 35%, transparent); border-left: 3px solid var(--accent); border-radius: 4px; margin: .3rem 0; }
  .turnhead { display: flex; align-items: baseline; gap: .5rem; font-size: .71875rem; color: var(--mut); min-width: 0; }
  .turnbadge { font-weight: 700; color: var(--accent-contrast); font-size: .8125rem; }
  .turnwho { font-weight: 600; }
  .turnat { margin-left: auto; flex: 0 0 auto; }
  .turnbody { font-size: .8438rem; line-height: 1.55; overflow-wrap: break-word; }
  .turnbody p { margin: .35rem 0; }
  .turnbody ul { margin: .35rem 0; padding-left: 1.15rem; }
  .turn .handlechip { margin-top: 0; font-size: .6875rem; padding: .05rem .4rem; }
  .sem .titleline { display: flex; align-items: baseline; gap: .5rem; }
  .sem .title { font-size: .875rem; font-weight: 600; flex: 1 1 auto; min-width: 0; }
  .sem .title.derived { font-weight: 400; font-style: italic; }
  .sem .meta { font-size: .75rem; color: var(--mut); margin-top: .15rem; }
  .live {
    display: inline-block; font-size: .65625rem; font-weight: 700; letter-spacing: .06em;
    color: var(--accent); border: 1px solid var(--accent); border-radius: 999px; padding: 0 .45rem;
  }
  .renamebtn { background: none; border: none; color: var(--mut); cursor: pointer; font-size: .8125rem; padding: 0 .2rem; }
  .renamebtn:hover { color: var(--accent); background: none; }
  .toggleline { margin-top: .5rem; }
  .toggleline button { font-size: .75rem; }
  #gate { max-width: 26rem; margin: 3rem auto; padding: 0 1rem; }
  #gate p { font-size: .875rem; color: var(--mut); }
</style>
</head>
<body>
<div id="gate" hidden>
  <div class="wordmark">Sum<span class="dot">·</span>inar <span class="sublabel">companion</span></div>
  <p>Paste a connector token to open the companion, or open it from your <a href="/account/">account page</a> (already signed in there? it hands the key over automatically).</p>
  <input id="gate-token" type="password" autocomplete="off" placeholder="suminar_…">
  <div style="margin-top: .8rem"><button id="gate-open">Open companion</button></div>
  <p class="status" id="gate-status" role="status"></p>
</div>

<div class="col" id="main" hidden>
  <header>
    <span class="wordmark">Sum<span class="dot">·</span>inar</span>
    <span class="sublabel">companion</span>
    <a class="acct" href="/account/" target="_blank" rel="noopener">account ↗</a>
  </header>

  <div class="tabs" role="tablist" id="tabs">
    <button id="tab-shelf" class="tab active" type="button">Shelf</button>
    <button id="tab-seminars" class="tab" type="button">Seminars<span id="tab-live-dot" class="tablive" hidden></span></button>
  </div>

  <section id="pane-shelf">
    <div id="live-strip" hidden></div>
    <input id="filter" type="search" placeholder="Filter sources — title, author, @handle…" autocomplete="off">
    <p class="status" id="pal-status" role="status"></p>
    <div id="palette"></div>
    <div class="toggleline" id="pal-more-line" hidden>
      <span class="status" id="pal-count"></span>
      <button class="ghost" id="pal-show-all" type="button">Show all</button>
    </div>
  </section>

  <section id="pane-seminars" hidden>
    <div id="seminars"></div>
    <div class="toggleline"><button class="ghost" id="show-all" hidden>Show conversations without agent turns</button></div>
  </section>

  <!-- The seminar page: the canonical record, live. This is where a seminar
       is managed — its title is renamed here, its participants ride as chips
       in the header, and every source-agent turn renders exactly as authored
       regardless of what the host chat did to it. -->
  <section id="pane-seminar" hidden>
    <div class="seminarhead">
      <button class="backbtn" id="sem-back" type="button" title="Back to the companion">←</button>
      <span class="seminartitle" id="sem-title"></span>
      <span class="live" id="sem-live" hidden>live</span>
      <button class="renamebtn" id="sem-rename" type="button" title="Rename seminar">✎</button>
    </div>
    <div class="semchips" id="sem-chips"></div>
    <div id="sem-record"></div>
    <p class="status" id="sem-status" role="status"></p>
  </section>
</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  function el(tag, attrs = {}, text) {
    const node = document.createElement(tag);
    for (const [key, value] of Object.entries(attrs)) node.setAttribute(key, value);
    if (text !== undefined) node.textContent = text;
    return node;
  }
  let TOKEN = null;
  try { TOKEN = sessionStorage.getItem("suminar_token"); } catch {}

  async function api(path, options = {}) {
    const headers = new Headers(options.headers || {});
    if (TOKEN) headers.set("authorization", "Bearer " + TOKEN);
    const res = await fetch(path, { ...options, headers });
    if (res.status === 401) { showGate("That token was not accepted — it may have been revoked."); throw new Error("unauthorized"); }
    const body = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(body.error_description || body.error || ("HTTP " + res.status));
    return body;
  }

  function showGate(message) {
    TOKEN = null;
    try { sessionStorage.removeItem("suminar_token"); } catch {}
    $("main").hidden = true;
    $("gate").hidden = false;
    if (message) { $("gate-status").textContent = message; $("gate-status").className = "status err"; }
  }
  function openWith(token) {
    TOKEN = token;
    try { sessionStorage.setItem("suminar_token", token); } catch {}
    $("gate").hidden = true;
    $("main").hidden = false;
    loadAll();
    route();
  }
  $("gate-open").addEventListener("click", () => {
    const token = $("gate-token").value.trim();
    if (!token.startsWith("suminar_")) { $("gate-status").textContent = "Connector tokens start with suminar_"; $("gate-status").className = "status err"; return; }
    openWith(token);
  });
  $("gate-token").addEventListener("keydown", (e) => { if (e.key === "Enter") $("gate-open").click(); });

  // ---- the palette ----
  function handleChip(handle) {
    const chip = el("button", { class: "handlechip", type: "button", title: "Click to copy @" + handle }, "@" + handle);
    chip.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText("@" + handle);
        const prior = chip.textContent;
        chip.textContent = "✓ copied";
        chip.classList.add("copied");
        setTimeout(() => { chip.textContent = prior; chip.classList.remove("copied"); }, 1200);
      } catch {}
    });
    return chip;
  }
  // MLA title styling per work type; unclassified stays bare (Dave's rule).
  function citeNode(citation, workType) {
    const cite = el("div", { class: "cite" });
    if (citation?.verbatim) { cite.textContent = citation.verbatim; return cite; }
    if (!citation?.title) return cite;
    if (citation.authorsLabel) cite.append(document.createTextNode(citation.authorsLabel + " "));
    const punct = /[.!?]$/.test(citation.title) ? "" : ".";
    const yearTail = citation.year ? " " + citation.year + "." : "";
    if (workType === "contained") cite.append(document.createTextNode("“" + citation.title + punct + "”" + yearTail));
    else if (workType === "standalone") { cite.append(el("i", {}, citation.title)); cite.append(document.createTextNode(punct + yearTail)); }
    else cite.append(document.createTextNode(citation.title + punct + yearTail));
    return cite;
  }
  function paletteEntry(citation, workType, handle, statusClass, searchExtra) {
    const entry = el("div", { class: "entry" });
    entry.append(el("span", { class: "dot " + statusClass }));
    const body = el("div", { class: "body" });
    body.append(citeNode(citation, workType));
    if (handle) body.append(handleChip(handle));
    entry.append(body);
    entry.dataset.search = ((citation?.verbatim || "") + " " + (citation?.authorsLabel || "") + " " + (citation?.title || "") + " " + (handle || "") + " " + (searchExtra || "")).toLowerCase();
    return entry;
  }
  // Search-first at any scale: with no filter typed, only the most recent
  // sources show (a 300-agent shelf is a thing you search, not scan); typing
  // searches the whole shelf. "Show all" lifts the window for a browse.
  const RECENT_LIMIT = 15;
  let SHOW_ALL_SOURCES = false;
  function applyFilter() {
    const needle = $("filter").value.trim().toLowerCase();
    const entries = [...$("palette").children];
    let shown = 0;
    for (const entry of entries) {
      const matches = !needle || entry.dataset.search.includes(needle);
      const withinWindow = Boolean(needle) || SHOW_ALL_SOURCES || shown < RECENT_LIMIT;
      const visible = matches && withinWindow;
      entry.hidden = !visible;
      if (visible) shown += 1;
    }
    const capped = !needle && !SHOW_ALL_SOURCES && entries.length > RECENT_LIMIT;
    $("pal-more-line").hidden = !capped;
    if (capped) $("pal-count").textContent = "Showing " + RECENT_LIMIT + " of " + entries.length + " — type to search the rest, or";
  }
  $("filter").addEventListener("input", applyFilter);
  $("pal-show-all").addEventListener("click", () => { SHOW_ALL_SOURCES = true; applyFilter(); });

  // ---- tabs: the two instruments, one tap apart at any shelf size ----
  function setTab(which) {
    try { sessionStorage.setItem("suminar_companion_tab", which); } catch {}
    $("pane-shelf").hidden = which !== "shelf";
    $("pane-seminars").hidden = which !== "seminars";
    $("tab-shelf").classList.toggle("active", which === "shelf");
    $("tab-seminars").classList.toggle("active", which === "seminars");
  }
  $("tab-shelf").addEventListener("click", () => setTab("shelf"));
  $("tab-seminars").addEventListener("click", () => setTab("seminars"));
  let bootTab = "shelf";
  try { bootTab = sessionStorage.getItem("suminar_companion_tab") || "shelf"; } catch {}
  setTab(bootTab);

  // ---- seminars ----
  function trimTitle(line) {
    const clean = (line || "").replace(/\s+/g, " ").trim();
    if (!clean) return "Seminar";
    if (clean.length <= 64) return clean;
    const cut = clean.slice(0, 64);
    return (cut.slice(0, cut.lastIndexOf(" ")) || cut).trim() + "…";
  }
  function derivedTitle(seminar) { return trimTitle(seminar.firstUserLine); }
  function fmtDay(iso) {
    try { return new Date(iso).toLocaleDateString(undefined, { month: "short", day: "numeric" }); } catch { return ""; }
  }
  let SHOW_ALL = false;
  function renderSeminars(seminars) {
    const wrap = $("seminars");
    wrap.replaceChildren();
    const now = Date.now();
    let hidden = 0;
    let anyLive = false;
    for (const seminar of seminars) {
      if (!SHOW_ALL && !seminar.agentTurns) { hidden += 1; continue; }
      const box = el("div", { class: "sem" });
      const titleline = el("div", { class: "titleline" });
      const named = Boolean(seminar.title);
      const title = el("span", { class: "title" + (named ? "" : " derived") }, seminar.title || derivedTitle(seminar));
      titleline.append(title);
      if (now - Date.parse(seminar.lastEventAt || seminar.updatedAt) < 180000) { titleline.append(el("span", { class: "live" }, "live")); anyLive = true; }
      box.append(titleline);
      // The home list is pure navigation; the seminar page is where a
      // seminar is managed (renamed, read, exported).
      box.addEventListener("click", () => { location.hash = "#sem=" + seminar.seminarId; });
      const who = (seminar.participants || []).map((p) => "@" + p.handle).join("  ");
      box.append(el("div", { class: "meta" },
        fmtDay(seminar.createdAt) + " · " + seminar.agentTurns + " agent turn" + (seminar.agentTurns === 1 ? "" : "s") + (who ? " · " + who : "")));
      wrap.append(box);
    }
    $("show-all").hidden = SHOW_ALL || hidden === 0;
    if (!SHOW_ALL && hidden > 0) $("show-all").textContent = "Show " + hidden + " conversation" + (hidden === 1 ? "" : "s") + " without agent turns";
    $("tab-live-dot").hidden = !anyLive;
  }
  $("show-all").addEventListener("click", () => { SHOW_ALL = true; loadAll(); });

  // The current seminar has two visible-cause signals, never a hidden one:
  // liveness (its record grew within ~3 min, by event time) pins it labeled
  // "live", and deliberately opening a record pins that seminar labeled
  // "opened" until another is opened. Quiet, unopened seminars pin nothing.
  function renderLiveStrip(seminars) {
    const strip = $("live-strip");
    strip.replaceChildren();
    const now = Date.now();
    const isLive = (seminar) => now - Date.parse(seminar.lastEventAt || seminar.updatedAt) < 180000;
    const pinned = seminars
      .filter((seminar) => isLive(seminar) && (seminar.participants || []).length)
      .map((seminar) => ({ seminar, label: "live" }));
    let lastOpened = null;
    try { lastOpened = sessionStorage.getItem("suminar_last_seminar"); } catch {}
    if (lastOpened && !pinned.some((pin) => pin.seminar.seminarId === lastOpened)) {
      const opened = seminars.find((seminar) => seminar.seminarId === lastOpened);
      if (opened && (opened.participants || []).length) pinned.push({ seminar: opened, label: "opened" });
    }
    for (const pin of pinned.slice(0, 3)) {
      const box = el("div", { class: "livestrip" });
      const head = el("div", { class: "livestriphead" });
      head.append(el("span", { class: pin.label === "live" ? "live" : "openedpill" }, pin.label));
      const stripTitle = el("span", { class: "livestriptitle", style: "cursor:pointer", title: "Open the record" }, pin.seminar.title || derivedTitle(pin.seminar));
      stripTitle.addEventListener("click", () => { location.hash = "#sem=" + pin.seminar.seminarId; });
      head.append(stripTitle);
      box.append(head);
      const chips = el("div", { class: "livestripchips" });
      for (const participant of pin.seminar.participants || []) chips.append(handleChip(participant.handle));
      box.append(chips);
      strip.append(box);
    }
    strip.hidden = pinned.length === 0;
  }

  // ---- the seminar page: the canonical record, live ----
  // Every source-agent turn renders exactly as authored, straight from the
  // room's own record — host display quirks (orphaned answers, stripped
  // badges, mangled markdown) never touch it.
  const SEM = { id: null, lastSeq: 0, firstUserText: "", meta: null };
  function fmtTime(iso) {
    try { return new Date(iso).toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" }); } catch { return ""; }
  }
  // Minimal, safe rendering of authored markdown: paragraphs, bullets,
  // **bold** and _italic_ spans. Built from DOM nodes — never innerHTML.
  function appendSpans(node, text) {
    const parts = String(text).split(/(\*\*[^*\n]+\*\*|(?<![\w])_[^_\n]+_(?![\w]))/g);
    for (const part of parts) {
      if (!part) continue;
      if (/^\*\*[^*\n]+\*\*$/.test(part)) node.append(el("b", {}, part.slice(2, -2)));
      else if (/^_[^_\n]+_$/.test(part)) node.append(el("i", {}, part.slice(1, -1)));
      else node.append(document.createTextNode(part));
    }
  }
  function renderRich(target, text) {
    for (const block of String(text || "").split(/\n{2,}/)) {
      const lines = block.split("\n").filter((line) => line.trim());
      if (!lines.length) continue;
      if (lines.every((line) => /^\s*[*•-]\s+/.test(line))) {
        const list = el("ul");
        for (const line of lines) {
          const item = el("li");
          appendSpans(item, line.replace(/^\s*[*•-]\s+/, ""));
          list.append(item);
        }
        target.append(list);
      } else {
        const para = el("p");
        lines.forEach((line, index) => {
          if (index) para.append(el("br"));
          appendSpans(para, line);
        });
        target.append(para);
      }
    }
  }
  function turnNode(ev, handleByAgentId) {
    const wrap = el("div", { class: "turn " + (ev.speakerType || "") });
    const head = el("div", { class: "turnhead" });
    if (ev.speakerType === "source_agent") {
      head.append(el("span", { class: "turnbadge" }, "📄 " + (ev.speakerDisplayName || "Source agent")));
      const handle = handleByAgentId.get(ev.agentId);
      if (handle) head.append(handleChip(handle));
    } else {
      head.append(el("span", { class: "turnwho" }, ev.speakerType === "user" ? "You" : (ev.speakerDisplayName || "Host")));
    }
    head.append(el("span", { class: "turnat" }, fmtTime(ev.at)));
    wrap.append(head);
    const body = el("div", { class: "turnbody" });
    renderRich(body, ev.text);
    wrap.append(body);
    return wrap;
  }
  function updateSeminarTitle() {
    const named = Boolean(SEM.meta && SEM.meta.title);
    const titleEl = $("sem-title");
    if (!titleEl) return;
    titleEl.textContent = named ? SEM.meta.title : trimTitle(SEM.firstUserText);
    titleEl.classList.toggle("derived", !named);
  }
  async function pollSeminar() {
    if (!SEM.id) return;
    const requested = SEM.id;
    try {
      const body = await api("/api/account/seminars/" + encodeURIComponent(requested) + "?after=" + SEM.lastSeq);
      if (SEM.id !== requested || body.seminarId !== requested) return;
      const record = $("sem-record");
      const nearBottom = window.innerHeight + window.scrollY >= document.body.offsetHeight - 240;
      const handleByAgentId = new Map((body.participants || []).map((p) => [p.agentId, p.handle]));
      for (const ev of body.events || []) {
        if (!SEM.firstUserText && ev.speakerType === "user") SEM.firstUserText = ev.text || "";
        record.append(turnNode(ev, handleByAgentId));
        SEM.lastSeq = Math.max(SEM.lastSeq, ev.sequence || 0);
      }
      SEM.meta = body;
      updateSeminarTitle();
      $("sem-live").hidden = !(Date.now() - Date.parse(body.lastEventAt || body.updatedAt) < 180000);
      const chips = $("sem-chips");
      chips.replaceChildren();
      for (const participant of body.participants || []) {
        if (participant.handle) chips.append(handleChip(participant.handle));
      }
      $("sem-status").textContent = SEM.lastSeq === 0 ? "No visible turns in this seminar yet." : "";
      $("sem-status").className = "status";
      if ((body.events || []).length && nearBottom) window.scrollTo(0, document.body.scrollHeight);
    } catch (error) {
      if (error.message !== "unauthorized") { $("sem-status").textContent = error.message; $("sem-status").className = "status err"; }
    }
  }
  function openSeminar(id) {
    if (SEM.id === id) return;
    // Opening a record is a visible act of intent: this seminar pins to the
    // shelf's strip (labeled "opened") until another record is opened.
    try { sessionStorage.setItem("suminar_last_seminar", id); } catch {}
    SEM.id = id; SEM.lastSeq = 0; SEM.firstUserText = ""; SEM.meta = null;
    $("sem-record").replaceChildren();
    $("sem-title").textContent = "…";
    $("sem-title").classList.remove("derived");
    $("sem-chips").replaceChildren();
    $("sem-live").hidden = true;
    $("sem-status").textContent = "";
    $("tabs").hidden = true;
    $("pane-shelf").hidden = true;
    $("pane-seminars").hidden = true;
    $("pane-seminar").hidden = false;
    pollSeminar();
  }
  function closeSeminar() {
    SEM.id = null;
    $("pane-seminar").hidden = true;
    $("tabs").hidden = false;
    let tab = "shelf";
    try { tab = sessionStorage.getItem("suminar_companion_tab") || "shelf"; } catch {}
    setTab(tab);
  }
  $("sem-back").addEventListener("click", () => { location.hash = ""; });
  $("sem-rename").addEventListener("click", () => {
    if (!SEM.id) return;
    const titleEl = $("sem-title");
    const input = el("input", { type: "text", maxlength: "200", value: (SEM.meta && SEM.meta.title) || "" });
    input.placeholder = trimTitle(SEM.firstUserText);
    const save = el("button", { type: "button", style: "margin-left:.4rem; flex:0 0 auto" }, "Save");
    const editline = el("div", { style: "display:flex; flex:1 1 auto; min-width:0; align-items:center" });
    save.addEventListener("click", async () => {
      try {
        const res = await api("/api/account/seminars/" + encodeURIComponent(SEM.id) + "/title", {
          method: "POST", headers: { "content-type": "application/json" },
          body: JSON.stringify({ title: input.value.trim() }),
        });
        if (SEM.meta) SEM.meta.title = res.title;
        editline.replaceWith(titleEl);
        updateSeminarTitle();
      } catch (error) { $("sem-status").textContent = error.message; $("sem-status").className = "status err"; }
    });
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") save.click(); });
    editline.append(input, save);
    titleEl.replaceWith(editline);
    input.focus();
  });
  function route() {
    const match = location.hash.match(/^#sem=([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})$/i);
    if (match && TOKEN) openSeminar(match[1].toLowerCase());
    else closeSeminar();
  }
  window.addEventListener("hashchange", route);

  // ---- load + refresh ----
  async function loadAll() {
    try {
      const [docsBody, synBody, semBody] = await Promise.all([
        api("/documents"),
        api("/api/account/syndications").catch(() => ({ received: [] })),
        api("/api/account/seminars").catch(() => ({ seminars: [] })),
      ]);
      const palette = $("palette");
      palette.replaceChildren();
      for (const doc of (docsBody.documents || [])) {
        if (!doc.agent) continue;
        const statusClass = doc.status === "ready" ? "ready" : doc.status === "failed" ? "bad" : "warn";
        palette.append(paletteEntry(doc.agent.citation, doc.agent.workType, doc.agent.handle, statusClass, doc.filename));
      }
      for (const received of (synBody.received || [])) {
        palette.append(paletteEntry(received.citation, received.workType, received.localHandle, "warn", "syndicated"));
      }
      applyFilter();
      $("pal-status").textContent = "";
      renderSeminars(semBody.seminars || []);
      renderLiveStrip(semBody.seminars || []);
    } catch (error) {
      if (error.message !== "unauthorized") { $("pal-status").textContent = error.message; $("pal-status").className = "status err"; }
    }
  }
  // A long-lived side window stays fresh without hammering the budgets:
  // refresh on focus; the home views once a minute, the open record every
  // 15s (its reads are delta-fetched and run on their own rate rule).
  window.addEventListener("focus", () => { if (TOKEN) { loadAll(); pollSeminar(); } });
  setInterval(() => { if (TOKEN && document.visibilityState === "visible") loadAll(); }, 60000);
  setInterval(() => { if (TOKEN && SEM.id && document.visibilityState === "visible") pollSeminar(); }, 15000);

  // ---- boot: session token, opener handoff, or the gate ----
  if (TOKEN) { openWith(TOKEN); return; }
  if (window.opener) {
    let answered = false;
    window.addEventListener("message", (event) => {
      if (event.origin !== location.origin) return;
      if (answered || !event.data || event.data.type !== "suminar:token" || typeof event.data.token !== "string") return;
      answered = true;
      openWith(event.data.token);
    });
    try { window.opener.postMessage("suminar:token?", location.origin); } catch {}
    setTimeout(() => { if (!answered) showGate(); }, 1500);
  } else {
    showGate();
  }
})();
</script>
</body>
</html>
